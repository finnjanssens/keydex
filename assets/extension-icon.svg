<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C6CF7"/>
      <stop offset="1" stop-color="#B25CF7"/>
    </linearGradient>
    <linearGradient id="glyph" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C6CF7"/>
      <stop offset="1" stop-color="#B25CF7"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- keycap side (depth) -->
  <rect x="131" y="135" width="250" height="250" rx="56" fill="#D9D2F7"/>
  <!-- keycap top -->
  <rect x="131" y="121" width="250" height="250" rx="56" fill="#FFFFFF" filter="url(#sh)"/>
  <!-- command glyph -->
  <text x="256" y="246" font-family="SF Pro Display, Apple Symbols, Helvetica, Arial, sans-serif"
        font-size="180" text-anchor="middle" dominant-baseline="central" fill="url(#glyph)">&#8984;</text>
</svg>
